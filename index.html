<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona 3 Reload Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p3r-light-blue: #00d2ff;
            --p3r-dark-blue: #0000a0;
            --shard-color: #ff007f;
            --p3r-font: 'Montserrat', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Stays black until video loads */
            font-family: Arial, sans-serif;
        }

        /* VIDEO CONTAINER CONFIG */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Bring to front for testing, we will move it back once it works */
            background-color: #000520; 
            overflow: hidden;
        }

        .video-bg {
            position: absolute;
            width: 110vw; 
            height: 110vh;
            top: 50%;
            left: 50%;
            object-fit: cover;
            /* This keeps Makoto's face in frame */
            object-position: center bottom; 
            transform: translate(-50%, -50%); 
            transition: opacity 1s ease-in-out;
            pointer-events: none;
        }

        #menu-intro { z-index: 5; }
        #menu-loop { z-index: 4; }
        .hidden { opacity: 0; pointer-events: none; }

        /* UI ELEMENTS */
        .menu-wrapper {
            position: absolute;
            top: 50%;
            left: 60%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .menu-item {
            position: relative;
            font-family: var(--p3r-font);
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: 900;
            color: white;
            font-style: italic;
            margin: 8px 0;
            transform: skew(-25deg);
            cursor: pointer;
            transition: transform 0.2s ease-out;
            opacity: 0;
            animation: slideIn 0.5s ease-out forwards;
        }

        .menu-item:hover {
            transform: skew(-25deg) translateX(30px) scale(1.1);
        }

        /* Shard Effect */
        .menu-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 120%; height: 100%;
            background: var(--shard-color);
            clip-path: polygon(0% 0%, 15% 45%, 45% 0%, 100% 50%, 70% 100%, 0% 100%);
            mix-blend-mode: screen;
            opacity: 0;
            transition: 0.15s;
        }

        .menu-item:hover::after { opacity: 1; }

        @keyframes slideIn {
            to { opacity: 1; transform: skew(-25deg) translateX(0); }
        }

        .wallet-ui {
            position: absolute;
            top: 50px; left: 50px;
            background: white;
            color: black;
            padding: 10px 30px;
            transform: skew(-15deg);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="menu-loop" class="video-bg" muted autoplay loop playsinline>
            <source src="main.mp4" type="video/mp4">
        </video>

        <video id="menu-intro" class="video-bg" muted autoplay playsinline>
            <source src="splash.mp4" type="video/mp4">
        </video>
    </div>

    <div class="wallet-ui">
        <div style="font-size: 2rem;">¥ Gabriel Berres</div>
        <div style="font-size: 0.8rem; color: #555;">Programmer Analyst</div>
    </div>

    <div class="menu-wrapper">
        <div class="menu-item" style="animation-delay: 0.1s;">About Me</div>
        <div class="menu-item" style="animation-delay: 0.2s;">Work Experience</div>
        <a href="https://github.com/bearcat1109" target="_blank" style="text-decoration: none;">
            <div class="menu-item" style="animation-delay: 0.1s;">Github Link</div>
        </a>
        <div class="menu-item" style="animation-delay: 0.4s;">Contact Info</div>
        <!-- <div class="menu-item" style="animation-delay: 0.5s;">Quest</div>
        <div class="menu-item" style="animation-delay: 0.6s;">Social Link</div> -->
    </div>

    <script>
        const intro = document.getElementById('menu-intro');
        
        // Final fallback: If the video DOES load, this will fire.
        intro.onplay = () => console.log("Splash is playing!");
        
        intro.onended = () => {
            intro.classList.add('hidden');
            console.log("Intro ended, switching to loop.");
        };

        // Troubleshooting: Log if the files are even found
        intro.onerror = () => console.error("Could not find splash.mp4");
        document.getElementById('menu-loop').onerror = () => console.error("Could not find main.mp4");
    </script>
</body>
</html>
